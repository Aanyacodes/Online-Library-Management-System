<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Portal</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #dfe7f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .role-selector {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        input[type="email"],
        input[type="password"] {

            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {

            width: 100%;
            padding: 12px;
            border: none;
            background: #2f74c0;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #255e9c;
        }

        #message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>Library Portal</h1>

        <div class="role-selector">

            <label>
                <input type="radio" name="role" value="member" checked>
                Member
            </label>

            <label>
                <input type="radio" name="role" value="librarian">
                Librarian
            </label>

        </div>

        <input type="email" id="email" placeholder="Email Address">

        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">
            Sign In
        </button>

        <div id="message"></div>

    </div>

    <script>

        async function login() {

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;

            const role =
                document.querySelector('input[name="role"]:checked').value;

            const message =
                document.getElementById("message");

            try {

                const response = await fetch("/api/login", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        email,
                        password,
                        role
                    })

                });

                const data = await response.json();

                if (data.status === "success") {

                    message.style.color = "green";
                    message.innerText =
                        "Login Successful";

                    if (role === "member") {

                        window.location.href =
                            "member.html";

                    } else {

                        window.location.href =
                            "librarian.html";
                    }

                } else {

                    message.style.color = "red";
                    message.innerText =
                        data.message;
                }

            } catch (error) {

                console.error(error);

                message.style.color = "red";

                message.innerText =
                    "Unable to connect to server.";
            }

        }

    </script>

</body>
</html>
